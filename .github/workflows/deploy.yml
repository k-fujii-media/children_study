name: Deploy to GitHub Pages

# main にマージ（push）されたら自動でビルドして GitHub Pages に公開する。
# 手動実行もできるよう workflow_dispatch を有効にしている。
on:
  push:
    branches: [main]
  workflow_dispatch:

# GitHub Pages へのデプロイに必要な権限。
permissions:
  contents: read
  pages: write
  id-token: write

# 同時実行を1つに制限（連続pushで競合しないように）。
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Setup Pages
        uses: actions/configure-pages@v5
        # Pages がまだ有効でなければ自動で有効化する。
        with:
          enablement: true

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
